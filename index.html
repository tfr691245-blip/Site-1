<!DOCTYPE html>
<html>
<head>
    <title>Blocker Test</title>
    <style>
        .fake-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 350px; z-index: 9999; font-family: Arial, sans-serif;
        }
        .fake-header { background: #4a90e2; color: white; padding: 15px; font-weight: bold; }
        .fake-body { padding: 20px; font-size: 14px; color: #333; }
    </style>
</head>
<body>

    <h1>Testing Popup Blocker</h1>
    <p>If the blocker works, the popup below will disappear instantly.</p>

    <!-- Simulated Fake Popup -->
    <div class="fake-popup">
        <div class="fake-header">To verify your request follow the instructions below</div>
        <div class="fake-body">
            <p>Use the keyboard in this order:</p>
            <ol>
                <li>Press Win + X</li>
                <li>Press I (or choose Terminal)</li>
                <li>Press Ctrl + V</li>
                <li>Press Enter</li>
            </ol>
            <p><strong>Verification code: 1FFA021DC77C</strong></p>
        </div>
    </div>

    <!-- The Stronger Blocker Script -->
    <script>
        // Watch for any new elements added to the page
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === 1) { // Check if it's an HTML element
                        const text = node.innerText || "";
                        // Check for the exact text from your screenshot
                        if (text.includes('Ctrl + V') || text.includes('Verification code') || text.includes('Terminal')) {
                            node.remove(); // Delete it immediately
                        }
                    }
                });
            });
        });

        // Start watching the whole page
        observer.observe(document.body, { childList: true, subtree: true });
    </script>

</body>
</html>
