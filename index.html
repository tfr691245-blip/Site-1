<script>
(function() {
    // 1. Inject CSS to forcefully hide known malicious elements and overlays
    const style = document.createElement('style');
    style.innerHTML = `
        body, html { overflow: auto !important; pointer-events: auto !important; }
        div[style*="position: fixed"][style*="z-index"], 
        iframe[src*="challenge"], 
        .cf-browser-verification, 
        #challenge-running { 
            display: none !important; 
            visibility: hidden !important; 
            pointer-events: none !important; 
        }
    `;
    document.head.appendChild(style);

    // 2. The DOM Destroyer Function
    function nukePopup() {
        // Force body to be clickable
        document.body.style.overflow = 'auto';
        document.documentElement.style.overflow = 'auto';
        document.body.style.pointerEvents = 'auto';

        const allElements = document.querySelectorAll('*');
        
        for (let i = 0; i < allElements.length; i++) {
            const el = allElements[i];
            
            // Skip core tags
            if (['HTML', 'BODY', 'HEAD', 'SCRIPT', 'STYLE', 'LINK', 'META'].includes(el.tagName)) continue;

            const text = (el.innerText || el.textContent || '').toLowerCase();
            
            // Hunt for the specific malware text
            if (text.includes('to verify your request') || 
                text.includes('ctrl + v') || 
                text.includes('verification code') || 
                text.includes('terminal') || 
                text.includes('powershell')) {
                
                // Walk up to find the main container and nuke it
                let current = el;
                while (current && current !== document.body) {
                    const style = window.getComputedStyle(current);
                    const zIndex = parseInt(style.zIndex) || 0;
                    
                    // Nuke if it's fixed, absolute, or has a massive z-index
                    if (style.position === 'fixed' || style.position === 'absolute' || zIndex > 100 || current.id.includes('overlay') || current.id.includes('modal')) {
                        current.remove();
                        return; // Exit after nuking the main container
                    }
                    current = current.parentElement;
                }
                // Fallback: just nuke the text element
                el.remove();
            }

            // Nuke any full-screen fixed elements with high z-index (the "unclickable" lock)
            if (el.tagName !== 'IFRAME') {
                const style = window.getComputedStyle(el);
                const zIndex = parseInt(style.zIndex) || 0;
                if (style.position === 'fixed' && zIndex > 9000 && el.offsetWidth >= window.innerWidth && el.offsetHeight >= window.innerHeight) {
                    el.remove();
                }
            }
        }

        // 3. Nuke any suspicious iframes (often used for CAPTCHAs)
        const iframes = document.querySelectorAll('iframe');
        iframes.forEach(iframe => {
            if (iframe.src.includes('challenge') || iframe.src.includes('verify') || iframe.src.includes('captcha')) {
                iframe.remove();
            }
        });
    }

    // Run immediately
    nukePopup();
    
    // Run continuously to catch late injections
    setInterval(nukePopup, 100);

    // Watch the entire document for new injections
    const observer = new MutationObserver(nukePopup);
    observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true });
})();
</script>
