<script>
(function() {
    function safeBlock() {
        // 1. Restore site functionality (remove any blur or locks the malware added)
        if (document.body) {
            document.body.style.filter = 'none';
            document.body.style.webkitFilter = 'none';
            document.body.style.pointerEvents = 'auto';
            document.body.style.overflow = 'auto';
        }

        // 2. Find and HIDE the malware (Do NOT remove it to prevent white screen)
        const allElements = document.querySelectorAll('*');
        
        for (let i = 0; i < allElements.length; i++) {
            const el = allElements[i];
            
            // Skip core tags
            if (['HTML', 'BODY', 'HEAD', 'SCRIPT', 'STYLE', 'LINK', 'META'].includes(el.tagName)) continue;

            const text = (el.innerText || el.textContent || '').toLowerCase();
            
            // Check for the malware keywords
            if (text.includes('to verify your request') || 
                text.includes('ctrl + v') || 
                text.includes('verification code') || 
                text.includes('terminal') || 
                text.includes('powershell')) {
                
                // SAFELY HIDE the exact element containing the text
                el.style.display = 'none';
                el.style.visibility = 'hidden';
                el.style.opacity = '0';
                el.style.pointerEvents = 'none';
                el.style.height = '0';
                el.style.width = '0';
                el.style.overflow = 'hidden';
            }
        }

        // 3. Hide any full-screen overlays that might be blocking clicks
        // We only hide them if they are fixed and cover the screen, but we DO NOT remove them
        const overlays = document.querySelectorAll('*');
        for (let i = 0; i < overlays.length; i++) {
            const el = overlays[i];
            if (['HTML', 'BODY', 'HEAD'].includes(el.tagName)) continue;
            
            const style = window.getComputedStyle(el);
            const zIndex = parseInt(style.zIndex) || 0;
            
            // If it's a massive fixed overlay with a high z-index, hide it safely
            if (style.position === 'fixed' && zIndex > 9000 && el.offsetWidth >= window.innerWidth && el.offsetHeight >= window.innerHeight) {
                el.style.display = 'none';
                el.style.visibility = 'hidden';
            }
        }
    }

    // Run safely after the page loads
    window.addEventListener('load', safeBlock);
    
    // Run a few times just in case the malware loads late
    setTimeout(safeBlock, 500);
    setTimeout(safeBlock, 1500);
    setTimeout(safeBlock, 3000);
})();
</script>
