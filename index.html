<script>
(function() {
    // 1. Define the exact keywords from the malware
    const MALWARE_KEYWORDS = ['ctrl + v', 'verification code', 'powershell', 'to verify your request'];
    
    // Function to check if an element contains the malware text
    function containsMalware(el) {
        const text = (el.innerText || el.textContent || '').toLowerCase();
        return MALWARE_KEYWORDS.some(keyword => text.includes(keyword));
    }

    // Function to safely remove the malware without breaking your site
    function neutralize(el) {
        if (!el || !el.parentNode) return;
        
        // Walk up the DOM to find the main overlay container
        let current = el;
        // CRITICAL: Stop at BODY so we NEVER delete the main page structure
        while (current && current.tagName !== 'BODY' && current.tagName !== 'HTML') {
            const style = window.getComputedStyle(current);
            // If we find a fixed or absolute positioned container, it's the overlay
            if (style.position === 'fixed' || style.position === 'absolute') {
                current.remove();
                return;
            }
            current = current.parentElement;
        }
        
        // Fallback: If no fixed container is found, just hide the specific text element
        el.style.display = 'none';
    }

    // 2. Initial cleanup when the page loads
    function initialCleanup() {
        const elements = document.querySelectorAll('*');
        elements.forEach(el => {
            // Skip core elements
            if (['HTML', 'BODY', 'HEAD', 'SCRIPT', 'STYLE', 'LINK', 'META'].includes(el.tagName)) return;
            if (containsMalware(el)) {
                neutralize(el);
            }
        });
    }

    // Run initial cleanup safely
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialCleanup);
    } else {
        initialCleanup();
    }

    // 3. Lightweight monitoring for late injections (No freezing!)
    const observer = new MutationObserver((mutations) => {
        for (const mutation of mutations) {
            for (const node of mutation.addedNodes) {
                if (node.nodeType === 1) { // Only check HTML elements
                    if (containsMalware(node)) {
                        neutralize(node);
                    } else {
                        // Check children of the newly added node
                        const children = node.querySelectorAll('*');
                        for (const child of children) {
                            if (containsMalware(child)) {
                                neutralize(child);
                            }
                        }
                    }
                }
            }
        }
    });

    // Start observing the document
    if (document.documentElement) {
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }
})();
</script>
